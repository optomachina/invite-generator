name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (test / typecheck / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit tests
        run: bun test

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build
        env:
          # Build must not require a real key. Routes read the env at request
          # time, so a placeholder keeps next build from tripping anything that
          # happens to touch the var at module load.
          OPENAI_API_KEY: ci-placeholder
